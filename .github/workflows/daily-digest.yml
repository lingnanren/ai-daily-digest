name: Daily Digest Email

on:
  schedule:
    # GitHub Actions schedules use UTC. 00:00 UTC = 08:00 Asia/Shanghai.
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run self-tests
        run: bun scripts/digest.ts --self-test

      - name: Generate and email digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          MAIL_TO: yza15@qq.com
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_STARTTLS: ${{ secrets.SMTP_STARTTLS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          LISTEN_PAGE_URL: https://lingnanren.github.io/ai-daily-digest/listen.html
          LISTEN_PAGE_OUTPUT: ./public/listen.html
        run: |
          bun scripts/digest.ts \
            --hours 48 \
            --top-n 15 \
            --lang zh \
            --output ./output/digest-$(date -u +%Y%m%d).md

      - name: Publish listen page
        if: success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Upload digest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest
          path: |
            ./output/*.md
            ./public/*.html
          if-no-files-found: ignore
